<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animales y Hábitats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #fff8ee; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
  #game { width: 100%; max-width: 600px; padding: 16px; background: #FFF9F0; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  #header { text-align: center; margin-bottom: 12px; }
  #round-info { font-size: 15px; color: #7c5c3a; font-weight: 500; margin-bottom: 4px; }
  #instruction { font-size: 19px; font-weight: 700; color: #3a2a10; margin-bottom: 12px; text-align: center; }
  #animals-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 16px; min-height: 90px; }
  .animal-card {
    width: 82px; height: 82px; border-radius: 16px; background: white;
    border: 2.5px solid #e5c07a; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: grab; font-size: 36px;
    user-select: none; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .animal-card span.name { font-size: 11px; font-weight: 600; color: #5a3e1b; margin-top: 2px; }
  .animal-card.dragging { opacity: 0.5; transform: scale(1.12); }
  .animal-card.correct { border-color: #3dba74; background: #eafaf1; cursor: default; }
  .animal-card.wrong { border-color: #e24b4a; background: #fcebeb; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  #habitats-area { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .habitat-zone {
    flex: 1; min-width: 120px; max-width: 180px; min-height: 130px; border-radius: 18px;
    border: 3px dashed #ccc; padding: 8px 6px 6px; display: flex; flex-direction: column;
    align-items: center; transition: border-color 0.2s, background 0.2s;
  }
  .habitat-zone.drag-over { border-color: #3dba74; background: #eafaf1; }
  .habitat-icon { font-size: 32px; margin-bottom: 4px; }
  .habitat-label { font-size: 14px; font-weight: 700; color: #3a2a10; margin-bottom: 6px; }
  .habitat-animals { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; min-height: 40px; }
  .habitat-animals .animal-card { width: 52px; height: 52px; font-size: 24px; border-width: 2px; }
  .habitat-animals .animal-card span.name { font-size: 9px; }
  #feedback-banner {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 12px 28px; border-radius: 40px; font-size: 20px; font-weight: 700;
    z-index: 999; display: none; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.13);
  }
  #feedback-banner.show-correct { background: #3dba74; color: white; display: block; }
  #feedback-banner.show-wrong { background: #e24b4a; color: white; display: block; }
  #progress-bar { width: 100%; height: 10px; background: #f0dbb0; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  #progress-fill { height: 100%; background: linear-gradient(90deg,#f9a825,#3dba74); border-radius: 10px; transition: width 0.4s; }
  #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 16px; text-align: center; }
  #end-screen .trophy { font-size: 80px; margin-bottom: 12px; }
  #end-screen h2 { font-size: 30px; font-weight: 700; color: #3a2a10; margin-bottom: 8px; }
  #end-screen p { font-size: 17px; color: #7c5c3a; margin-bottom: 24px; }
  #play-again-btn {
    padding: 16px 40px; font-size: 20px; font-weight: 700; border-radius: 40px;
    background: #f9a825; border: none; color: white; cursor: pointer;
    box-shadow: 0 4px 14px rgba(249,168,37,0.4); transition: transform 0.15s;
  }
  #play-again-btn:hover { transform: scale(1.06); }
  .h-selva { background: #edfbe8; border-color: #7ec87e; }
  .h-oceano { background: #e6f4fb; border-color: #5bb5e8; }
  .h-desierto { background: #fdf6e3; border-color: #f2c96a; }
  .h-granja { background: #fff0e8; border-color: #f0a070; }
  .h-polar { background: #edf4fc; border-color: #a0c4e8; }
</style>
</head>
<body>

<div id="game">
  <div id="header">
    <div id="round-info">Ronda 1 de 5</div>
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
    <div id="instruction">¿Dónde vive este animal? ¡Arrástralo!</div>
  </div>
  <div id="animals-area"></div>
  <div id="habitats-area"></div>
</div>

<div id="end-screen">
  <div class="trophy">🏆</div>
  <h2>¡Felicidades!</h2>
  <p>¡Completaste todas las rondas!<br>Eres un experto en animales 🌍</p>
  <button id="play-again-btn">¡Jugar de nuevo!</button>
</div>

<div id="feedback-banner"></div>

<script>
const ROUNDS = [
  {
    habitat: { id: "selva", label: "Selva", icon: "🌴", cls: "h-selva" },
    animals: [
      { emoji: "🐒", name: "Mono" },
      { emoji: "🦜", name: "Loro" },
      { emoji: "🐆", name: "Jaguar" }
    ]
  },
  {
    habitat: { id: "oceano", label: "Océano", icon: "🌊", cls: "h-oceano" },
    animals: [
      { emoji: "🐬", name: "Delfín" },
      { emoji: "🦈", name: "Tiburón" },
      { emoji: "🐙", name: "Pulpo" }
    ]
  },
  {
    habitat: { id: "desierto", label: "Desierto", icon: "🏜️", cls: "h-desierto" },
    animals: [
      { emoji: "🦂", name: "Escorpión" },
      { emoji: "🐪", name: "Camello" },
      { emoji: "🦎", name: "Lagarto" }
    ]
  },
  {
    habitat: { id: "granja", label: "Granja", icon: "🌾", cls: "h-granja" },
    animals: [
      { emoji: "🐄", name: "Vaca" },
      { emoji: "🐷", name: "Cerdo" },
      { emoji: "🐔", name: "Gallina" }
    ]
  },
  {
    habitat: { id: "polar", label: "Polo Norte", icon: "❄️", cls: "h-polar" },
    animals: [
      { emoji: "🐻‍❄️", name: "Oso polar" },
      { emoji: "🐧", name: "Pingüino" },
      { emoji: "🦭", name: "Foca" }
    ]
  }
];

let currentRound = 0;
let placedCount = 0;
let totalAnimals = 0;
let draggingId = null;

function shuffle(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

function buildRound(roundIdx) {
  const round = ROUNDS[roundIdx];
  placedCount = 0;
  totalAnimals = round.animals.length;

  document.getElementById("round-info").textContent = `Ronda ${roundIdx + 1} de 5`;
  document.getElementById("progress-fill").style.width = ((roundIdx / 5) * 100) + "%";

  const animalsArea = document.getElementById("animals-area");
  animalsArea.innerHTML = "";
  const habitatsArea = document.getElementById("habitats-area");
  habitatsArea.innerHTML = "";

  shuffle(round.animals).forEach((a, i) => {
    const card = document.createElement("div");
    card.className = "animal-card";
    card.draggable = true;
    card.dataset.animal = a.name;
    card.dataset.habitat = round.habitat.id;
    card.id = "animal-" + i;
    card.innerHTML = `${a.emoji}<span class="name">${a.name}</span>`;
    card.addEventListener("dragstart", onDragStart);
    card.addEventListener("dragend", onDragEnd);
    card.addEventListener("touchstart", onTouchStart, { passive: true });
    card.addEventListener("touchmove", onTouchMove, { passive: false });
    card.addEventListener("touchend", onTouchEnd);
    animalsArea.appendChild(card);
  });

  const zone = document.createElement("div");
  zone.className = `habitat-zone ${round.habitat.cls}`;
  zone.dataset.habitat = round.habitat.id;
  zone.innerHTML = `<div class="habitat-icon">${round.habitat.icon}</div><div class="habitat-label">${round.habitat.label}</div><div class="habitat-animals"></div>`;
  zone.addEventListener("dragover", onDragOver);
  zone.addEventListener("dragleave", onDragLeave);
  zone.addEventListener("drop", onDrop);
  habitatsArea.appendChild(zone);
}

function onDragStart(e) {
  draggingId = this.id;
  setTimeout(() => this.classList.add("dragging"), 0);
}
function onDragEnd() { this.classList.remove("dragging"); }
function onDragOver(e) { e.preventDefault(); this.classList.add("drag-over"); }
function onDragLeave() { this.classList.remove("drag-over"); }
function onDrop(e) {
  e.preventDefault();
  this.classList.remove("drag-over");
  const card = document.getElementById(draggingId);
  if (card) handleDrop(card, this);
}

let touchCard = null, touchClone = null;
function onTouchStart(e) {
  touchCard = this;
  const rect = this.getBoundingClientRect();
  touchClone = this.cloneNode(true);
  touchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;opacity:0.8;pointer-events:none;z-index:9999;transition:none;`;
  document.body.appendChild(touchClone);
}
function onTouchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - 41) + "px";
  touchClone.style.top = (t.clientY - 41) + "px";
}
function onTouchEnd(e) {
  if (touchClone) { document.body.removeChild(touchClone); touchClone = null; }
  if (!touchCard) return;
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el ? el.closest(".habitat-zone") : null;
  if (zone) handleDrop(touchCard, zone);
  touchCard = null;
}

function handleDrop(card, zone) {
  if (card.dataset.habitat === zone.dataset.habitat) {
    card.classList.add("correct");
    card.draggable = false;
    card.style.cursor = "default";
    zone.querySelector(".habitat-animals").appendChild(card);
    showFeedback("¡Muy bien! ✓", true);
    placedCount++;
    if (placedCount === totalAnimals) setTimeout(() => nextRound(), 900);
  } else {
    card.classList.add("wrong");
    showFeedback("¡Inténtalo de nuevo! 🔄", false);
    setTimeout(() => card.classList.remove("wrong"), 600);
  }
}

let feedbackTimer = null;
function showFeedback(msg, correct) {
  const el = document.getElementById("feedback-banner");
  el.textContent = msg;
  el.className = correct ? "show-correct" : "show-wrong";
  if (feedbackTimer) clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => { el.className = ""; el.style.display = "none"; }, 1200);
}

function nextRound() {
  currentRound++;
  if (currentRound >= ROUNDS.length) {
    document.getElementById("game").style.display = "none";
    document.getElementById("end-screen").style.display = "flex";
    document.getElementById("progress-fill").style.width = "100%";
  } else {
    buildRound(currentRound);
  }
}

document.getElementById("play-again-btn").addEventListener("click", () => {
  currentRound = 0;
  document.getElementById("end-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  buildRound(0);
});

buildRound(0);
</script>
</body>
</html>
